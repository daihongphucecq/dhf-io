<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Bảng điều khiển · dhf.io.vn</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1422; --bg-soft:#0f1d30; --bg-2:#0c1828; --line:#182742; --line-2:#22344f;
    --ink:#e8eef7; --dim:#8da3c0; --faint:#6f86a8;
    --blue:#4da3ff; --blue-deep:#2b6fd6; --amber:#f0b357; --green:#4ade80; --red:#ff6b6b;
    --mono:'JetBrains Mono',ui-monospace,monospace; --disp:'Space Grotesk',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--blue);text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}
  ::placeholder{color:var(--faint)}
  :focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:6px}

  /* login */
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{width:100%;max-width:380px;background:var(--bg-soft);border:1px solid var(--line);border-radius:16px;padding:36px 30px}
  .brand{font-family:var(--mono);font-weight:700;font-size:18px;letter-spacing:.02em;margin-bottom:4px}
  .brand span{color:var(--blue)}
  .login-card h1{font-family:var(--disp);font-size:20px;font-weight:600;margin:14px 0 4px}
  .login-card p{color:var(--dim);font-size:13.5px;margin-bottom:22px}
  label{display:block;font-size:12.5px;color:var(--dim);margin:14px 0 6px;font-weight:500}
  .inp{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:9px;padding:11px 13px;color:var(--ink);font-size:14px;transition:border-color .2s}
  .inp:focus{border-color:var(--blue);outline:none}
  textarea.inp{min-height:90px;resize:vertical;line-height:1.5}
  .btn{background:var(--blue);color:#06101f;font-weight:700;border:none;border-radius:9px;padding:11px 20px;font-size:14px;transition:transform .15s,background .15s}
  .btn:hover{background:#6cb4ff;transform:translateY(-1px)}
  .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--dim);font-weight:500}
  .btn-ghost:hover{border-color:var(--blue);color:var(--blue);background:transparent}
  .btn-danger{background:transparent;border:1px solid #5a2630;color:var(--red);font-weight:500}
  .btn-danger:hover{background:rgba(255,107,107,.08);border-color:var(--red)}
  .btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px}
  .login .btn{width:100%;margin-top:22px;padding:12px}

  /* shell */
  .shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  .side{background:var(--bg-soft);border-right:1px solid var(--line);padding:22px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:auto}
  .side .brand{padding:0 8px 16px;border-bottom:1px solid var(--line);margin-bottom:14px}
  .navgrp{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);padding:14px 8px 6px}
  .navlink{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;border:none;color:var(--dim);font-size:14px;padding:9px 10px;border-radius:8px;transition:background .15s,color .15s}
  .navlink:hover{background:var(--bg-2);color:var(--ink)}
  .navlink.active{background:rgba(77,163,255,.12);color:var(--blue);font-weight:600}
  .navlink .ic{width:16px;text-align:center;opacity:.85}
  .side-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
  .main{padding:30px clamp(20px,4vw,48px);max-width:1000px}
  .page-h{font-family:var(--disp);font-size:24px;font-weight:600;margin-bottom:4px}
  .page-sub{color:var(--dim);font-size:13.5px;margin-bottom:24px}

  .field{margin-bottom:20px}
  .field>label{margin-top:0}
  .bi{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .tr-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .bi .col span{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;color:var(--faint);margin-bottom:5px}
  .hint{font-size:12px;color:var(--faint);margin-top:5px}
  .warn{color:var(--amber);font-size:12px;margin-top:5px}
  .save-bar{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 40%);padding:18px 0 6px;display:flex;gap:10px;align-items:center}
  .card{background:var(--bg-soft);border:1px solid var(--line);border-radius:13px;padding:20px;margin-bottom:16px}
  .card-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
  .card-top .t{font-family:var(--mono);font-size:12px;color:var(--blue)}
  .row-acts{display:flex;gap:6px}
  .dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:8px}
  .dash-card{background:var(--bg-soft);border:1px solid var(--line);border-radius:12px;padding:18px;text-align:left;transition:transform .15s,border-color .15s}
  .dash-card:hover{transform:translateY(-2px);border-color:var(--blue-deep)}
  .dash-card .dt{font-family:var(--disp);font-weight:600;font-size:15px}
  .dash-card .dd{color:var(--dim);font-size:12.5px;margin-top:3px}

  .post-row{display:flex;align-items:center;gap:12px;justify-content:space-between}
  .badge{font-family:var(--mono);font-size:10.5px;padding:3px 8px;border-radius:999px;border:1px solid var(--line)}
  .badge.pub{color:var(--green);border-color:#1f6e3f}
  .badge.draft{color:var(--amber);border-color:#6e561f}
  .thumb{width:54px;height:38px;object-fit:cover;border-radius:6px;border:1px solid var(--line);background:var(--bg-2)}
  .cover-prev{max-width:280px;border-radius:10px;border:1px solid var(--line);margin-top:8px;display:block}

  /* toast */
  #toasts{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:10px;z-index:99}
  .toast{background:var(--bg-soft);border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:10px;padding:12px 16px;font-size:13.5px;max-width:340px;box-shadow:0 12px 30px -12px rgba(0,0,0,.7);animation:tin .2s ease}
  .toast.ok{border-left-color:var(--green)} .toast.err{border-left-color:var(--red)}
  @keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .hidden{display:none!important}
  @media(max-width:780px){ .shell{grid-template-columns:1fr} .side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;gap:4px} .side-foot{flex-direction:row} .bi{grid-template-columns:1fr} }
</style>
</head>
<body>
<div id="login" class="login hidden">
  <form class="login-card" id="loginForm">
    <div class="brand">dhf<span>.io.vn</span></div>
    <h1>Bảng điều khiển</h1>
    <p>Đăng nhập để chỉnh sửa nội dung trang web.</p>
    <label for="le">Email</label>
    <input class="inp" id="le" type="email" autocomplete="username" required>
    <label for="lp">Mật khẩu</label>
    <input class="inp" id="lp" type="password" autocomplete="current-password" required>
    <button class="btn" type="submit" id="loginBtn">Đăng nhập</button>
  </form>
</div>

<div id="app" class="shell hidden">
  <aside class="side">
    <div class="brand">dhf<span>.io.vn</span></div>
    <nav id="nav"></nav>
    <div class="side-foot">
      <a class="navlink" href="/" target="_blank"><span class="ic">↗</span> Xem trang web</a>
      <button class="navlink" id="logout"><span class="ic">⏻</span> Đăng xuất</button>
    </div>
  </aside>
  <main class="main" id="view"></main>
</div>

<div id="toasts"></div>

<script src="/admin/app.js"></script>
</body>
</html>
